name: ERP Domain CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Build with Maven
        working-directory: ./erp-domain
        run: mvn -B clean compile
      
      - name: Run tests with coverage
        working-directory: ./erp-domain
        run: mvn -B test jacoco:report
      
      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: erp-domain/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: erp-domain/target/surefire-reports/
          retention-days: 30
      
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: erp-domain/target/site/jacoco/
          retention-days: 30
      
      - name: Package application
        working-directory: ./erp-domain
        run: mvn -B package -DskipTests
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erp-domain-jar
          path: erp-domain/target/*.jar
          retention-days: 7
  
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      # Checkstyle runs in advisory mode (continue-on-error: true) to provide
      # feedback without blocking builds. This allows teams to gradually improve
      # code quality while maintaining development velocity.
      - name: Run Checkstyle (advisory)
        working-directory: ./erp-domain
        run: mvn -B checkstyle:checkstyle
        continue-on-error: true
      
      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: erp-domain/target/checkstyle-result.xml
          retention-days: 30
      
      - name: Verify code compilation
        working-directory: ./erp-domain
        run: mvn -B verify -DskipTests
  
  database-migrations:
    name: Database Migration Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: test_erp
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Validate Flyway migrations
        working-directory: ./erp-domain
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_erp
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password
        run: |
          mvn -B flyway:validate flyway:info \
            -Dflyway.url=$SPRING_DATASOURCE_URL \
            -Dflyway.user=$SPRING_DATASOURCE_USERNAME \
            -Dflyway.password=$SPRING_DATASOURCE_PASSWORD \
            -Dflyway.locations=filesystem:src/main/resources/db/migration
      
      - name: Run migrations
        working-directory: ./erp-domain
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_erp
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password
        run: |
          mvn -B flyway:migrate \
            -Dflyway.url=$SPRING_DATASOURCE_URL \
            -Dflyway.user=$SPRING_DATASOURCE_USERNAME \
            -Dflyway.password=$SPRING_DATASOURCE_PASSWORD \
            -Dflyway.locations=filesystem:src/main/resources/db/migration

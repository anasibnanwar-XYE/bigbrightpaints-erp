name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  erp-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests (erp-domain)
        working-directory: erp-domain
        run: mvn -B -ntp verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-erp-domain
          path: erp-domain/target/site/jacoco/**

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-erp-domain
          path: erp-domain/target/surefire-reports/**

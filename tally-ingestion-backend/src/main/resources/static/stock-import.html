<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tally Stock Import</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #1f2933; background: #f7f9fb; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; max-width: 640px; }
    h1 { margin-top: 0; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input[type="file"], input[type="number"] { width: 100%; }
    button { margin-top: 16px; padding: 10px 14px; border: none; background: #2563eb; color: #fff; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    pre { background: #0b1021; color: #e5e7eb; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .status { margin-top: 12px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tally Stock Import</h1>
    <p>Select your Tally XML export and upload it to the parser endpoint.</p>
    <label for="file">Tally XML file</label>
    <input type="file" id="file" accept=".xml">

    <label for="companyId">Company ID (optional, default 1)</label>
    <input type="number" id="companyId" min="1" placeholder="1" />

    <button id="uploadBtn">Upload &amp; Parse</button>
    <div class="status" id="status"></div>
    <pre id="output" style="display:none;"></pre>
  </div>

  <script>
    const uploadBtn = document.getElementById('uploadBtn');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    uploadBtn.addEventListener('click', async () => {
      const fileInput = document.getElementById('file');
      const companyIdInput = document.getElementById('companyId');
      const file = fileInput.files[0];
      if (!file) {
        statusEl.textContent = 'Please choose a Tally XML file.';
        return;
      }

      const form = new FormData();
      form.append('file', file);
      if (companyIdInput.value) {
        form.append('companyId', companyIdInput.value);
      }

      uploadBtn.disabled = true;
      statusEl.textContent = 'Uploading...';
      outputEl.style.display = 'none';
      outputEl.textContent = '';

      try {
        const resp = await fetch('/v1/stock-import/upload', {
          method: 'POST',
          body: form
        });
        const data = await resp.json();
        statusEl.textContent = resp.ok ? 'Upload succeeded' : `Upload failed (${resp.status})`;
        outputEl.textContent = JSON.stringify(data, null, 2);
        outputEl.style.display = 'block';
      } catch (err) {
        statusEl.textContent = 'Upload failed: ' + err.message;
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

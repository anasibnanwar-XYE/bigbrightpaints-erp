spring:
  application:
    name: tally-ingestion-backend

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tally_ingestion}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # Managed by Flyway
    properties:
      hibernate:
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Spring Batch Configuration
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false  # Disable auto-run of jobs

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 500MB

  # Caching Configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=5m
    cache-names:
      - brands
      - products
      - dealers
      - suppliers
      - accounts
      - mappings
      - id-registry

  # Async Configuration
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
    scheduling:
      pool:
        size: 4

# Server Configuration
server:
  port: ${PORT:8081}
  address: 0.0.0.0
  servlet:
    context-path: /api
  compression:
    enabled: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /management
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.bigbrightpaints.tally: DEBUG
    org.springframework.batch: DEBUG
    org.springframework.jdbc: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/tally-ingestion.log
    max-size: 10MB
    max-history: 30

# Tally Ingestion Specific Configuration
tally:
  ingestion:
    # Company prefix for ID generation
    company-prefix: ${COMPANY_PREFIX:BBP}

    # Batch processing settings
    batch:
      chunk-size: 1000
      page-size: 5000
      retry-limit: 3
      skip-limit: 100

    # Validation settings
    validation:
      enable-strict: false
      gstin-pattern: '^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$'
      pan-pattern: '^[A-Z]{5}[0-9]{4}[A-Z]{1}$'

    # File storage settings
    storage:
      type: ${STORAGE_TYPE:local}  # local or s3
      local:
        path: ${LOCAL_STORAGE_PATH:/tmp/tally-uploads}
      s3:
        bucket: ${S3_BUCKET:tally-ingestion}
        region: ${AWS_REGION:us-east-1}
        prefix: uploads/

    # Reconciliation settings
    reconciliation:
      fuzzy-match-threshold: 0.8
      exact-match-fields:
        - gstin
        - pan
        - email
      fuzzy-match-fields:
        - name
        - address

    # SKU generation patterns
    sku:
      patterns:
        SAPPHIRE: 'SAP-{BASE}-{COLOR}-{SIZE}-{PACK}-{SEQ}'
        NEROLAC: 'NER-{BASE}-{COLOR}-{SIZE}-{SEQ}'
        ASIAN: 'ASN-{BASE}-{COLOR}-{SIZE}-{SEQ}'
        BERGER: 'BRG-{BASE}-{COLOR}-{SIZE}-{SEQ}'
        default: '{BRAND}-{BASE}-{COLOR}-{SIZE}-{SEQ}'

      # Abbreviations for SKU components
      abbreviations:
        # Colors
        WHITE: WHT
        BLACK: BLK
        RED: RED
        BLUE: BLU
        GREEN: GRN
        YELLOW: YEL
        ORANGE: ORG
        PURPLE: PUR
        # Sizes
        LITER: L
        LITRE: L
        KILOGRAM: KG
        GRAM: G
        MILLILITER: ML
        # Product types
        EMULSION: EMUL
        ENAMEL: ENAM
        PRIMER: PRIM
        PUTTY: PUTY
        THINNER: THIN

    # ID generation settings
    id-generation:
      use-deterministic: true
      hash-algorithm: SHA-256
      id-length: 12

    # Audit settings
    audit:
      enabled: true
      log-all-changes: true
      retain-days: 90

    # Parallel processing
    parallel:
      enabled: true
      thread-pool-size: 8

    # Rate limiting
    rate-limit:
      enabled: false
      requests-per-minute: 100

# API Documentation
springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ERP Integration Configuration
erp:
  backend:
    url: ${ERP_BACKEND_URL:http://localhost:8080}
    api-key: ${ERP_API_KEY:}
    connect-timeout: 5000
    read-timeout: 30000

  # Multi-tenancy
  default-company-id: ${DEFAULT_COMPANY_ID:1}

# Feature Flags
features:
  dry-run-enabled: true
  auto-reconciliation: true
  duplicate-detection: true
  cascade-updates: false
  real-time-validation: true
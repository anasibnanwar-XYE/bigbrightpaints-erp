id: merge-specialist
name: Merge Specialist Agent
scope_paths:
  - tickets/
  - scripts/harness_orchestrator.py
  - erp-domain/src/main/java/
  - erp-domain/src/test/java/
allowed_operations:
  - integrate_slice_branches
  - resolve_conflicts_with_scope_guardrails
  - verify_merge_diff_integrity
  - publish_merge_readiness_evidence
required_checks_before_done:
  - bash ci/lint-knowledgebase.sh
escalation_triggers:
  - ambiguous_conflict_resolution
  - dropped_or_overwritten_hunk_risk
  - out_of_scope_semantic_conflict
risk_tier: high
permissions_profile: enterprise_autonomous
timeout_policy: none
cross_module_workflow_required: true

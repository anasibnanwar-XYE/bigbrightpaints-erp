<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{mail/layout :: layout(~{::content})}">
<body>
<div th:fragment="content">

  <div style="margin-bottom: 20px;">
    <div style="width: 40px; height: 40px; background-color: #FFF1F2; border-radius: 50%; display: inline-block; text-align: center; line-height: 40px;">
      <span style="color: #E11D48; font-size: 20px;">!</span>
    </div>
  </div>

  <h1 class="font-sans text-slate-900 hero-text"
      style="margin: 0 0 24px 0; font-size: 24px; font-weight: 600; line-height: 1.3; letter-spacing: -0.5px;">
    Account Access Suspended
  </h1>

  <p class="font-sans text-slate-700" style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6;">
    Hello <span th:text="${displayName}" style="font-weight: 500;">User</span>,
  </p>

  <p class="font-sans text-slate-700" style="margin: 0; font-size: 15px; line-height: 1.6;">
    Your access to the Orchestrator ERP environment has been temporarily suspended by a system administrator. If you believe this is an error or require further information, please contact your internal IT support team.
  </p>

</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{mail/layout :: layout(~{::content})}">
<div th:fragment="content">
  <p class="muted" style="margin:0 0 14px 0;">Administrator Access</p>
  <h2 style="margin:0 0 12px 0; font-size:24px;">Welcome, <span th:text="${displayName}">User</span>!</h2>
  <p style="margin:0 0 20px 0; line-height:1.6;">
    Your BIG BRIGHT Paints ERP account is ready. Use the temporary password below and change it on first login.
  </p>
  <div style="padding:18px 16px; border:1px solid #e6e8eb; border-radius:10px; margin-bottom:18px;">
    <div style="margin-bottom:10px; font-weight:600;">Email</div>
    <div class="pill" style="background:#f8f9ff; color:#1d358b;" th:text="${email}">user@example.com</div>
    <div style="margin:18px 0 10px; font-weight:600;">Temporary Password</div>
    <div class="pill" style="background:#fff3e6; color:#f28a00;" th:text="${temporaryPassword}">TempPass123</div>
  </div>
  <a class="btn" th:href="${loginUrl}">Open Admin Dashboard</a>
  <p style="margin:18px 0 0 0; line-height:1.6;" class="muted">
    If you didn’t request this, please ignore this email or contact support.
  </p>
</div>
</body>
</html>

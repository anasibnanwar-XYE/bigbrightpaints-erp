<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:v="urn:schemas-microsoft-com:vml"
      xmlns:o="urn:schemas-microsoft-com:office:office"
      th:fragment="layout(content)">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title th:text="${subject}">Orchestrator ERP Notification</title>

  <style>
    @font-face {
      font-family: 'OpenAI Sans';
      src: url('/fonts/OpenAISans-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'OpenAI Sans';
      src: url('/fonts/OpenAISans-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'OpenAI Sans';
      src: url('/fonts/OpenAISans-Semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'OpenAI Sans';
      src: url('/fonts/OpenAISans-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }

    /* Reset & Base */
    html, body {
      margin: 0 auto !important;
      padding: 0 !important;
      height: 100% !important;
      width: 100% !important;
      background-color: #F8FAFC;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    * {
      -ms-text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
      box-sizing: border-box;
    }
    table, td {
      mso-table-lspace: 0pt !important;
      mso-table-rspace: 0pt !important;
      border-collapse: collapse !important;
      border-spacing: 0 !important;
    }
    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
      display: block;
    }

    /* Typography & Utilities */
    .font-sans {
      font-family: 'OpenAI Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    .text-slate-900 { color: #0F172A; }
    .text-slate-700 { color: #334155; }
    .text-slate-500 { color: #64748B; }
    .text-slate-400 { color: #94A3B8; }
    
    .bg-white { background-color: #ffffff; }
    .bg-slate-50 { background-color: #F8FAFC; }
    
    .email-wrapper {
      width: 100% !important;
      max-width: 600px !important;
      margin: 0 auto !important;
    }
    
    /* Layout Elements */
    .card {
      background-color: #ffffff;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }
    .content-pad {
      padding: 40px !important;
    }
    
    /* Components */
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background-color: #0F172A;
      color: #ffffff !important;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      border-radius: 6px;
      text-align: center;
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background-color: #1E293B;
    }

    @media screen and (max-width: 600px) {
      .email-wrapper { width: 100% !important; max-width: 100% !important; padding: 0 16px !important; }
      .content-pad { padding: 32px 24px !important; }
      .hero-text { font-size: 24px !important; }
    }
  </style>
</head>
<body width="100%" style="margin: 0; padding: 0 !important; mso-line-height-rule: exactly; background-color: #F8FAFC;" class="font-sans">
<center style="width: 100%; background-color: #F8FAFC; padding: 48px 0;">
  
  <div th:text="${preheader}" style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all;">
    Orchestrator ERP System Notification
  </div>

  <!--[if mso]>
  <table align="center" role="presentation" cellspacing="0" cellpadding="0" border="0" width="600">
    <tr><td>
  <![endif]-->
  
  <table align="center" role="presentation" cellspacing="0" cellpadding="0" border="0" class="email-wrapper">
    
    <!-- HEADER -->
    <tr>
      <td style="padding-bottom: 24px; text-align: center;">
        <table width="100%" role="presentation">
          <tr>
            <td align="center">
              <div class="font-sans text-slate-900" style="font-size: 20px; font-weight: 600; letter-spacing: -0.5px; line-height: 1;">ORCHESTRATOR</div>
              <div class="font-sans text-slate-500" style="font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px;">by Skeina</div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- MAIN CARD -->
    <tr>
      <td class="card bg-white">
        <table width="100%" role="presentation">
          <tr>
            <td class="content-pad" style="padding: 48px;">
              <th:block th:replace="${content}"></th:block>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- FOOTER -->
    <tr>
      <td style="padding-top: 32px; text-align: center;">
        <p class="font-sans text-slate-400" style="margin: 0 0 8px 0; font-size: 12px; line-height: 1.6;">
          &copy; <span th:text="${#dates.year(#dates.createNow())}">2025</span> Skeina Systems. All rights reserved.
        </p>
        <p class="font-sans text-slate-400" style="margin: 0; font-size: 12px; line-height: 1.6;">
          This is an automated notification from Orchestrator ERP.<br/>
          <a th:href="${baseUrl}" style="color: #64748B; text-decoration: underline;">Access your portal</a>
        </p>
      </td>
    </tr>

  </table>
  <!--[if mso]>
    </td></tr>
  </table>
  <![endif]-->

</center>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{mail/layout :: layout(~{::content})}">
<div th:fragment="content">
  <p class="muted" style="margin:0 0 14px 0;">Password Updated</p>
  <h2 style="margin:0 0 12px 0; font-size:24px;">All set, <span th:text="${displayName}">User</span>.</h2>
  <p style="margin:0 0 16px 0; line-height:1.6;">
    Your password for <strong th:text="${email}">user@example.com</strong> has been changed successfully.
  </p>
  <a class="btn" th:href="${loginUrl}">Go to Login</a>
  <p style="margin:16px 0 0 0; line-height:1.6;" class="muted">
    Didn’t make this change? Reset it again immediately and contact support.
  </p>
</div>
</body>
</html>

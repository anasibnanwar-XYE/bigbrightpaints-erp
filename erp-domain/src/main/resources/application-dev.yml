server:
  port: 8081
  address: 0.0.0.0
spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  mail:
    host: ${SPRING_MAIL_HOST:smtp-relay.brevo.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bigbright_erp}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
jwt:
  # 256-bit (32 bytes) secret for HS256. Must be provided via JWT_SECRET env variable.
  secret: ${JWT_SECRET:}
  access-token-ttl-seconds: 3600
  refresh-token-ttl-seconds: 604800
erp:
  security:
    encryption.key: ${ERP_ENCRYPTION_KEY:}
    mfa.enabled: true
  dispatch:
    # Configure with realistic account IDs in your dev DB to enable dispatch journals
    debit-account-id: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID:0}
    credit-account-id: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID:0}
  mail:
    base-url: http://localhost:3002

management:
  health:
    rabbit:
      enabled: false

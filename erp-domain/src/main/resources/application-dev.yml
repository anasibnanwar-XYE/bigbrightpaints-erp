server:
  port: 8081
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_domain
    username: erp
    password: erp
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
jwt:
  # Default dev secret; override with JWT_SECRET env for real deployments. Must be >=32 bytes.
  secret: ${JWT_SECRET:this-is-a-very-long-32-byte-secret-key-1234}
  access-token-ttl-seconds: 3600
  refresh-token-ttl-seconds: 604800
erp:
  dispatch:
    # Configure with realistic account IDs in your dev DB to enable dispatch journals
    debit-account-id: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID:0}
    credit-account-id: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID:0}

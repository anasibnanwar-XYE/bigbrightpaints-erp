commands:
  init: >-
    bash .factory/init.sh
  install: >-
    bash .factory/init.sh >/dev/null && cd erp-domain && mvn -q -DskipTests dependency:go-offline
  compile: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -DskipTests compile
  typecheck: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -DskipTests compile
  spotless-check: >-
    cd erp-domain && MIGRATION_SET=v2 mvn spotless:check
  spotless-apply: >-
    cd erp-domain && MIGRATION_SET=v2 mvn spotless:apply
  test: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='CriticalAccountingAxesIT,AccountingEndpointContractTest,SettlementControllerIdempotencyHeaderParityTest,ReconciliationControlsIT' test
  test-characterization: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='CriticalAccountingAxesIT,AccountingEndpointContractTest,SettlementControllerIdempotencyHeaderParityTest,ReconciliationControlsIT' test
  test-integration: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='JournalEntryE2ETest,CR_DealerReceiptSettlementAuditTrailTest,CR_PurchasingToApAccountingTest,ReconciliationControlsIT,TS_PeriodCloseBoundaryCoverageTest' test
  test-accounting-proof: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='JournalEntryE2ETest,AccountingEndpointContractTest,SettlementControllerIdempotencyHeaderParityTest,CriticalAccountingAxesIT,TS_RuntimeAccountingReplayConflictExecutableCoverageTest,CR_ManualJournalSafetyTest,CR_DealerReceiptSettlementAuditTrailTest,CR_PurchasingToApAccountingTest,CR_SalesReturnCreditNoteIdempotencyTest,NumberSequenceServiceIntegrationTest,ReferenceNumberServiceTest,TS_RuntimeReferenceNumberServiceExecutableCoverageTest,InvoiceServiceTest,AccountingServiceTest#dealerReceiptService_routesLiveReceiptFlowThroughJournalEntryService+creditDebitNoteService_routesLiveCreditNoteFlowThroughJournalEntryService+inventoryAccountingService_routesLiveLandedCostFlowThroughJournalEntryService' test
  test-dependent-proof: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='OrderFulfillmentE2ETest,ProcureToPayE2ETest,InventoryAccountingEventListenerIT,CreditDebitNoteIT,ReconciliationControlsIT,TS_PeriodCloseBoundaryCoverageTest,TS_PeriodCloseAtomicSnapshotTest' test
  gate-reconciliation: >-
    bash scripts/gate_reconciliation.sh
  contract-guards: >-
    bash scripts/guard_openapi_contract_drift.sh && bash scripts/guard_workflow_canonical_paths.sh && bash scripts/guard_accounting_portal_scope_contract.sh
  runtime-reset-validation: >-
    bash scripts/reset_final_validation_runtime.sh
  strict-runtime-smoke-check: >-
    python3 -c "import socket; [socket.create_connection(('127.0.0.1', port), 2).close() for port in (5433, 15673, 15674)]" && health=$(curl -s -o /tmp/accounting-mission-health.out -w '%{http_code}' http://localhost:19090/actuator/health || true) && readiness=$(curl -s -o /tmp/accounting-mission-readiness.out -w '%{http_code}' http://localhost:19090/actuator/health/readiness || true) && auth=$(curl -s -o /tmp/accounting-mission-auth.out -w '%{http_code}' http://localhost:18081/api/v1/auth/me || true) && mailhog=$(curl -s -o /tmp/accounting-mission-mailhog.out -w '%{http_code}' http://localhost:18025/api/v2/messages || true) && { [ "$health" = "200" ] && [ "$readiness" = "200" ] && [ "$mailhog" = "200" ] && { [ "$auth" = "200" ] || [ "$auth" = "401" ] || [ "$auth" = "403" ]; }; }
  targeted-accounting-proof: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='JournalEntryE2ETest,AccountingEndpointContractTest,SettlementControllerIdempotencyHeaderParityTest,CriticalAccountingAxesIT,TS_RuntimeAccountingReplayConflictExecutableCoverageTest,CR_ManualJournalSafetyTest,CR_DealerReceiptSettlementAuditTrailTest,CR_PurchasingToApAccountingTest,CR_SalesReturnCreditNoteIdempotencyTest,NumberSequenceServiceIntegrationTest,ReferenceNumberServiceTest,TS_RuntimeReferenceNumberServiceExecutableCoverageTest,InvoiceServiceTest,AccountingServiceTest#dealerReceiptService_routesLiveReceiptFlowThroughJournalEntryService+creditDebitNoteService_routesLiveCreditNoteFlowThroughJournalEntryService+inventoryAccountingService_routesLiveLandedCostFlowThroughJournalEntryService' test
  targeted-dependent-proof: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='OrderFulfillmentE2ETest,ProcureToPayE2ETest,InventoryAccountingEventListenerIT,CreditDebitNoteIT,ReconciliationControlsIT,TS_PeriodCloseBoundaryCoverageTest,TS_PeriodCloseAtomicSnapshotTest' test
  targeted-security-proof: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Dtest='AdminApprovalRbacIT,ReportControllerSecurityIT,ReportControllerRouteContractIT,PortalFinanceControllerIT,StatementAgingIT,DealerLedgerIT,CompanyContextFilterControlPlaneBindingTest,SuperAdminTenantWorkflowIsolationIT,TenantRuntimeEnforcementAuthIT,OpenApiSnapshotIT' test
  openapi-refresh: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -Djacoco.skip=true -Derp.openapi.snapshot.verify=true -Derp.openapi.snapshot.refresh=true -Dtest=OpenApiSnapshotIT test
  gate-fast: >-
    bash scripts/gate_fast.sh
  docs-lint: >-
    bash .factory/scripts/docs_lint.sh
  docs-contract-guards: >-
    bash .factory/scripts/docs_contract_guards.sh
  accounting-frontend-doc-contract-proof: >-
    bash .factory/scripts/accounting_frontend_doc_contract_proof.sh
  build: >-
    cd erp-domain && MIGRATION_SET=v2 mvn -q -DskipTests package

services:
  postgres-v2:
    start: >-
      bash .factory/scripts/compose_service.sh db up
    stop: >-
      bash .factory/scripts/compose_service.sh db stop
    healthcheck: >-
      python3 -c "import socket; s=socket.create_connection(('127.0.0.1', 5433), 2); s.close()"
    port: 5433
    depends_on: []

  rabbitmq:
    start: >-
      bash .factory/init.sh >/dev/null && docker compose up -d rabbitmq
    stop: >-
      docker compose stop rabbitmq
    healthcheck: >-
      python3 -c "import socket; [socket.create_connection(('127.0.0.1', port), 2).close() for port in (15673, 15674)]"
    port: 15673
    depends_on: []

  mailhog:
    start: >-
      bash .factory/init.sh >/dev/null && docker compose up -d mailhog
    stop: >-
      docker compose stop mailhog
    healthcheck: >-
      curl -sf http://localhost:18025/api/v2/messages >/tmp/accounting-mission-mailhog-health.out
    port: 18025
    depends_on: []

  backend-validation-v2:
    start: >-
      bash .factory/init.sh >/dev/null && docker compose up -d --build app
    stop: >-
      docker compose stop app
    healthcheck: >-
      curl -sf http://localhost:19090/actuator/health >/tmp/accounting-mission-backend-health.out && curl -sf http://localhost:19090/actuator/health/readiness >/tmp/accounting-mission-backend-readiness.out && { status=$(curl -s -o /tmp/accounting-mission-backend-auth.out -w '%{http_code}' http://localhost:18081/api/v1/auth/me || true) && { [ "$status" = "200" ] || [ "$status" = "401" ] || [ "$status" = "403" ]; }; }
    port: 18081
    depends_on: [postgres-v2, rabbitmq, mailhog]

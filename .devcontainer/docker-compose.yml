services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - maven-cache:/home/vscode/.m2
      # Docker socket mounting is handled by the docker-outside-of-container feature
      # This works with Colima on macOS and Docker Desktop on Windows/Linux
    environment:
      - MIGRATION_SET=v2
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/erp_domain
      - SPRING_DATASOURCE_USERNAME=erp
      - SPRING_DATASOURCE_PASSWORD=erp
      - SPRING_DATASOURCE_V2_URL=jdbc:postgresql://db:5432/erp_domain
      - SPRING_DATASOURCE_V2_USERNAME=erp
      - SPRING_DATASOURCE_V2_PASSWORD=erp
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_MAIL_HOST=mailhog
      - SPRING_MAIL_PORT=1025
      - SPRING_MAIL_USERNAME=mailhog
      - SPRING_MAIL_PASSWORD=mailhog
      - JWT_SECRET=devcontainer-jwt-secret-min-32-bytes-placeholder
      - ERP_SECURITY_ENCRYPTION_KEY=devcontainer-encryption-key-32b
      # Disable fail-fast config checks for devcontainer
      - ERP_ENVIRONMENT_VALIDATION_ENABLED=false
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: sleep infinity

  db:
    image: postgres:16-alpine
    container_name: erp_devcontainer_db
    environment:
      POSTGRES_DB: erp_domain
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: erp_devcontainer_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: erp_devcontainer_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  maven-cache:
  postgres_dev_data:
  rabbitmq_dev_data:
